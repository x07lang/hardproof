name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  X07_TOOLCHAIN_TAG: "v0.2.3"

jobs:
  check:
    name: ci / check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system deps
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            unzip
          cc --version
      - name: Cache X07 toolchain
        uses: actions/cache@v4
        with:
          path: ~/.x07
          key: x07-${{ runner.os }}-${{ env.X07_TOOLCHAIN_TAG }}
      - name: Install X07 (pinned)
        shell: bash
        run: ./scripts/ci/install_x07_toolchain.sh
      - name: Install formal verification tools (pinned)
        shell: bash
        run: ./scripts/ci/install_formal_verification_tools_linux.sh
      - name: Check
        shell: bash
        run: ./scripts/ci/check_all.sh

  check_macos:
    name: ci / check (macos)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install deps (macOS)
        shell: bash
        run: |
          set -euo pipefail
          brew install openssl@3 pkg-config cbmc z3
          cc --version
      - name: Cache X07 toolchain
        uses: actions/cache@v4
        with:
          path: ~/.x07
          key: x07-${{ runner.os }}-${{ env.X07_TOOLCHAIN_TAG }}
      - name: Install X07 (pinned)
        shell: bash
        run: ./scripts/ci/install_x07_toolchain.sh
      - name: Check
        shell: bash
        run: ./scripts/ci/check_all.sh

  check_windows_wsl2:
    name: ci / check (windows, wsl2)
    runs-on: windows-latest
    timeout-minutes: 75
    defaults:
      run:
        shell: wsl-bash {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up WSL2 (Ubuntu-24.04)
        uses: Vampire/setup-wsl@v6
        with:
          distribution: Ubuntu-24.04
          update: "true"
          additional-packages: >-
            bash
            build-essential
            ca-certificates
            curl
            git
            openssl
            libcurl4-openssl-dev
            libssl-dev
            pkg-config
            python3
            python3-venv
            unzip
            xz-utils

      - name: Install X07 + Check
        run: |
          set -euo pipefail
          export X07_TOOLCHAIN_TAG="${{ env.X07_TOOLCHAIN_TAG }}"

          as_root() {
            if command -v sudo >/dev/null 2>&1; then
              sudo "$@"
            else
              "$@"
            fi
          }

          ./scripts/ci/install_x07_toolchain.sh
          ./scripts/ci/install_formal_verification_tools_linux.sh
          export PATH="$HOME/.x07/bin:$PATH"
          ./scripts/ci/check_all.sh

name: Action smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start fixture server (good-http)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          conformance/scripts/spawn_reference_http.sh good-http noauth > out/action-smoke.server.log 2>&1 &
          echo "$!" > out/action-smoke.server.pid
          conformance/scripts/wait_for_http.sh http://127.0.0.1:18080/mcp >/dev/null

      - name: Resolve latest beta release (v0.3.*)
        id: beta
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          releases_json="$(
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases"
          )"

          beta_tag="$(
            python3 - <<'PY' "${releases_json}"
          import json
          import re
          import sys

          data = json.loads(sys.argv[1])
          for r in data:
            t = (r.get("tag_name") or "").strip()
            if re.match(r"^v0\\.3\\.\\d+-beta\\.\\d+$", t):
              print(t)
              raise SystemExit(0)
          print("")
          PY
          )"

          if [[ -z "${beta_tag}" ]]; then
            echo "found=false" >>"${GITHUB_OUTPUT}"
            echo "beta_tag=" >>"${GITHUB_OUTPUT}"
            echo "WARN: no v0.3.* beta release found; skipping action smoke." >&2
            exit 0
          fi

          echo "found=true" >>"${GITHUB_OUTPUT}"
          echo "beta_tag=${beta_tag}" >>"${GITHUB_OUTPUT}"

      - name: Run Hardproof Action
        if: steps.beta.outputs.found == 'true'
        uses: ./action
        with:
          url: http://127.0.0.1:18080/mcp
          full-suite: "false"
          sarif: "true"
          version: ${{ steps.beta.outputs.beta_tag }}

      - name: Upload reports
        if: always() && steps.beta.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: action-smoke-reports
          path: |
            out/doctor.json
            out/scan
            out/action-smoke.server.log

      - name: Stop fixture server
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f out/action-smoke.server.pid ]]; then
            pid="$(cat out/action-smoke.server.pid)"
            kill "${pid}" >/dev/null 2>&1 || true
            wait "${pid}" >/dev/null 2>&1 || true
          fi

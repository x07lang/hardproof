name: Action smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start fixture server (good-http)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          conformance/scripts/spawn_reference_http.sh good-http noauth > out/action-smoke.server.log 2>&1 &
          echo "$!" > out/action-smoke.server.pid
          conformance/scripts/wait_for_http.sh http://127.0.0.1:18080/mcp >/dev/null

      - name: Resolve latest beta release (v0.*)
        id: beta
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          beta_tag="$(
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases" \
            | python3 -c 'import json, re, sys; data=json.load(sys.stdin); data=data if isinstance(data, list) else []; pat=re.compile(r"^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$"); tag=next(((r.get("tag_name") or "").strip() for r in data if isinstance(r, dict) and pat.match((r.get("tag_name") or "").strip())), ""); print(tag)'
          )"

          if [[ -z "${beta_tag}" ]]; then
            echo "found=false" >>"${GITHUB_OUTPUT}"
            echo "beta_tag=" >>"${GITHUB_OUTPUT}"
            echo "WARN: no v0.* beta release found; skipping action smoke." >&2
            exit 0
          fi

          echo "found=true" >>"${GITHUB_OUTPUT}"
          echo "beta_tag=${beta_tag}" >>"${GITHUB_OUTPUT}"

      - name: Run Hardproof Action
        if: steps.beta.outputs.found == 'true'
        uses: ./action
        with:
          url: http://127.0.0.1:18080/mcp
          full-suite: "false"
          sarif: "true"
          allow-partial-score: "true"
          version: ${{ steps.beta.outputs.beta_tag }}

      - name: Upload reports
        if: always() && steps.beta.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: action-smoke-reports
          path: |
            out/doctor.json
            out/scan
            out/action-smoke.server.log

      - name: Stop fixture server
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f out/action-smoke.server.pid ]]; then
            pid="$(cat out/action-smoke.server.pid)"
            kill "${pid}" >/dev/null 2>&1 || true
            wait "${pid}" >/dev/null 2>&1 || true
          fi

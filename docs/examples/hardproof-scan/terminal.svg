<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280">
  <rect width="960" height="280" rx="12" fill="#0b0e14" />
  <circle cx="24" cy="22" r="6" fill="#ff5f56" />
  <circle cx="44" cy="22" r="6" fill="#ffbd2e" />
  <circle cx="64" cy="22" r="6" fill="#27c93f" />
  <text
    x="24"
    y="58"
    font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace"
    font-size="16"
    fill="#c0caf5"
    xml:space="preserve"
  >
    <tspan x="24" dy="0">$ hardproof scan --url http://127.0.0.1:18080/mcp --out out/conformance</tspan>
    <tspan x="24" dy="24">check       | result</tspan>
    <tspan x="24" dy="24">conformance | pass  </tspan>

name: Hardproof Scan (beta)
description: Run Hardproof verification in GitHub Actions using a release binary.

inputs:
  url:
    description: "MCP server base URL (example: http://127.0.0.1:3000/mcp)"
    required: false
    default: ""
  cmd:
    description: "MCP stdio command (example: ./server --stdio)"
    required: false
    default: ""
  cwd:
    description: Working directory for cmd (optional)
    required: false
    default: ""
  env-file:
    description: Env file to load for cmd (optional)
    required: false
    default: ""
  full-suite:
    description: Run the extended conformance suite (default false)
    required: false
    default: "false"
  baseline:
    description: Path to a conformance expected-failures YAML file (optional)
    required: false
    default: ""
  sarif:
    description: Emit a SARIF report file (default false)
    required: false
    default: "false"
  allow-partial-score:
    description: Allow threshold gating to pass when the scan remains partial
    required: false
    default: "false"
  require-trust-for-full-score:
    description: Require a full score and fail when trust evidence was not evaluated
    required: false
    default: "false"
  threshold:
    description: Minimum score (0-100) required to pass (default 80)
    required: false
    default: "80"
  version:
    description: "Hardproof release tag (example: v0.4.0-beta.7) or latest-beta"
    required: false
    default: latest-beta

outputs:
  scan_ok:
    description: "true if scan passed (exit 0)"
    value: ${{ steps.scan.outputs.scan_ok }}
  report_json:
    description: Path to JSON summary report
    value: ${{ steps.scan.outputs.report_json }}
  report_junit:
    description: Path to JUnit XML report
    value: ${{ steps.scan.outputs.report_junit }}
  report_html:
    description: Path to HTML report
    value: ${{ steps.scan.outputs.report_html }}
  report_sarif:
    description: Path to SARIF report (when enabled)
    value: ${{ steps.scan.outputs.report_sarif }}
  ok:
    description: "compat alias for scan_ok"
    value: ${{ steps.scan.outputs.ok }}
  json_report:
    description: "compat alias for report_json"
    value: ${{ steps.scan.outputs.json_report }}
  junit_report:
    description: "compat alias for report_junit"
    value: ${{ steps.scan.outputs.junit_report }}
  html_report:
    description: "compat alias for report_html"
    value: ${{ steps.scan.outputs.html_report }}
  sarif_report:
    description: "compat alias for report_sarif"
    value: ${{ steps.scan.outputs.sarif_report }}

runs:
  using: composite
  steps:
    - id: scan
      uses: ./hardproof-scan
      with:
        url: ${{ inputs.url }}
        cmd: ${{ inputs.cmd }}
        cwd: ${{ inputs.cwd }}
        env-file: ${{ inputs.env-file }}
        full-suite: ${{ inputs.full-suite }}
        baseline: ${{ inputs.baseline }}
        sarif: ${{ inputs.sarif }}
        allow-partial-score: ${{ inputs.allow-partial-score }}
        require-trust-for-full-score: ${{ inputs.require-trust-for-full-score }}
        threshold: ${{ inputs.threshold }}
        version: ${{ inputs.version }}
